name: EAS Build & Submit

on:
  push:
    branches:
      - main # production build + submit
      - develop # preview-build only

jobs:
  build:
    name: Build Accountability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install EAS CLI
        run: bun add -g eas-cli

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{secrets.EXPO_TOKEN}}

      #Preview build on develop branch
      - name: EAS Preview Build
        if: github.ref == 'refs/heads/develop'
        run: eas build --platform android --profile preview --non-interactive

      #Production build + submit on main branch
      - name: EAS Production Build
        if: github.ref == 'refs/heads/main'
        run: eas build --platform android --profile production --non-interactive

      - name: Submit to stores
        if: github.ref == 'refs/heads/main'
        run: eas submit --platform android --profile production --non-interactive
